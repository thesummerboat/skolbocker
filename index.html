<style>
:root{--navy:#1F3864;--navy2:#2E4C7E;--bg:#eef1f6;--card:#fff;--line:#dce3ef;--ink:#1c2532;
--muted:#6b7688;--accent:#2E75B6;--hi:#fff3bf;--hog:#1e7d4f;--hogbg:#e7f4ec;--medel:#b8860b;--medelbg:#fbf3e0;--lag:#8a94a6;--lagbg:#eef1f5;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
header{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;padding:12px 20px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.htop{max-width:1180px;margin:0 auto;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
h1{font-size:19px;margin:0;font-weight:700}
.sub{font-size:12.5px;color:#c7d3ea;flex:1}
.langtoggle{display:flex;gap:0;border:1px solid rgba(255,255,255,.4);border-radius:20px;overflow:hidden;align-self:center}
.langtoggle button{background:transparent;color:#eaf0fb;border:none;padding:5px 14px;font-size:12.5px;cursor:pointer;font-weight:600}
.langtoggle button.on{background:#fff;color:var(--navy)}
.searchwrap{max-width:1180px;margin:10px auto 0;position:relative}
#search{width:100%;padding:12px 44px 12px 15px;border:none;border-radius:9px;font-size:15px;outline:none}
#count{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted)}
.xlang{max-width:1180px;margin:6px auto 0;font-size:11.5px;color:#aebbd6;min-height:15px}
.chips{max-width:1180px;margin:8px auto 0;display:flex;gap:7px;flex-wrap:wrap}
.chip{border:1px solid rgba(255,255,255,.35);background:transparent;color:#eaf0fb;padding:5px 12px;border-radius:20px;font-size:12.5px;cursor:pointer;transition:.12s}
.chip:hover{background:rgba(255,255,255,.14)}
.chip.on{background:#fff;color:var(--navy);border-color:#fff;font-weight:600}
main{max-width:1180px;margin:18px auto 60px;padding:0 20px}
.hero{background:linear-gradient(135deg,#22406e,#2E4C7E);color:#fff;border-radius:14px;padding:22px 24px;margin-bottom:20px;box-shadow:0 3px 14px rgba(30,50,90,.18)}
.hero h2{margin:0 0 6px;font-size:22px}
.hero p{margin:0 0 14px;font-size:13.5px;color:#d6e0f2;max-width:820px}
.stats{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:6px}
.stat b{display:block;font-size:26px;line-height:1.1}
.stat span{font-size:12px;color:#c2d0ea}
.legend{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#e6edf8}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sec-title{margin:22px 2px 10px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--line);padding-bottom:5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px 13px;box-shadow:0 1px 3px rgba(20,30,50,.05)}
.card.komp{border-color:#bcd0ea;box-shadow:0 1px 5px rgba(46,117,182,.13)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card h3{margin:0 0 2px;font-size:15.5px;color:var(--navy)}
.meta{font-size:11.5px;color:var(--muted);margin-bottom:2px}
.isbn{font-family:"SFMono-Regular",Consolas,monospace;font-size:11px;color:var(--muted)}
.cbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.b-hog{background:var(--hogbg);color:var(--hog)} .b-medel{background:var(--medelbg);color:var(--medel)} .b-lag{background:var(--lagbg);color:var(--lag)}
.note{font-size:11.5px;color:var(--muted);font-style:italic;margin:8px 0 4px;padding-left:9px;border-left:2px solid var(--line)}
ul.toc{margin:8px 0 0;padding:0;list-style:none}
ul.toc li{padding:3px 0 3px 2px;font-size:13px;border-bottom:1px dashed #eef1f7}
ul.toc li:last-child{border-bottom:none}
ul.toc li.part{font-weight:700;color:var(--navy2);margin-top:6px;font-size:12.5px;text-transform:uppercase;letter-spacing:.3px;border-bottom:none}
li.dim{opacity:.32} mark{background:var(--hi);padding:0 1px;border-radius:2px}
.src{margin-top:9px;font-size:11px}.src a{color:var(--accent);text-decoration:none}.src a:hover{text-decoration:underline}.src.own{color:var(--muted)}
.noresult{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;display:none}
footer{max-width:1180px;margin:0 auto 40px;padding:0 20px;font-size:11.5px;color:var(--muted)}
@media print{header{position:static}.chip,#search,#count,.src,.xlang,.langtoggle{display:none}.card{break-inside:avoid;box-shadow:none}}
</style>
</head>

 }
 count.textContent=shown+' '+(shown===1?u.post:u.posts);
 noresult.style.display=shown?'none':'block';
}
[...document.querySelectorAll('#langtoggle button')].forEach(x=>x.onclick=()=>{lang=x.dataset.lang;render();});
search.addEventListener('input',render);
render();
</script>
</body>
</html>
